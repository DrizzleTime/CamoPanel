name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-linux-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build web
        working-directory: web
        run: bun run build

      - name: Embed web assets
        run: |
          rm -rf server/internal/webui/dist
          mkdir -p server/internal/webui/dist
          cp -R web/dist/. server/internal/webui/dist/

      - name: Build server
        working-directory: server
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p ../dist
          go build -trimpath -ldflags="-s -w" -o ../dist/camopanel ./cmd/camopanel

      - name: Package release
        env:
          GOARCH: ${{ matrix.goarch }}
        run: |
          package_root="dist/camopanel_linux_${GOARCH}"

          rm -rf "$package_root"
          mkdir -p "$package_root/deploy"

          cp dist/camopanel "$package_root/camopanel"
          cp -R templates "$package_root/templates"
          cp deploy/camopanel.service "$package_root/deploy/camopanel.service"
          cp deploy/install.sh "$package_root/deploy/install.sh"
          cp deploy/camopanel.env.example "$package_root/deploy/camopanel.env.example"

          tar -C dist -czf "dist/camopanel_linux_${GOARCH}.tar.gz" "camopanel_linux_${GOARCH}"
          sha256sum "dist/camopanel_linux_${GOARCH}.tar.gz" > "dist/camopanel_linux_${GOARCH}.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: camopanel_linux_${{ matrix.goarch }}
          path: |
            dist/camopanel_linux_${{ matrix.goarch }}.tar.gz
            dist/camopanel_linux_${{ matrix.goarch }}.tar.gz.sha256

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: camopanel_linux_*
          path: release
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
